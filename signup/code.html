<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MindEase Welcome Presentation</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .serif-text {
            font-family: "Times New Roman", Times, serif;
        }

        .phone-frame {
            width: 390px;
            height: 844px;
            box-shadow: 0 0 0 12px #2A3A4A, 0 0 0 14px #42474c;
            border-radius: 48px;
            position: relative;
            overflow: hidden;
        }

        .concentric-rings {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ring-1 { width: 240px; height: 240px; border: 1px solid rgba(42, 58, 74, 0.15); border-radius: 100%; }
        .ring-2 { width: 180px; height: 180px; border: 1px solid rgba(42, 58, 74, 0.2); border-radius: 100%; }
        .ring-3 { width: 120px; height: 120px; border: 1px solid rgba(42, 58, 74, 0.25); border-radius: 100%; }
        .dot-inner { width: 40px; height: 40px; background-color: #2A3A4A; border-radius: 100%; }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "inverse-surface": "#2f3032",
                      "on-surface-variant": "#42474c",
                      "tertiary-fixed": "#dfe3e8",
                      "secondary": "#376380",
                      "error-container": "#ffdad6",
                      "on-surface": "#1a1c1d",
                      "on-primary-container": "#365264",
                      "on-tertiary-fixed": "#171c20",
                      "outline": "#73787c",
                      "surface-tint": "#466274",
                      "surface-container-low": "#f4f3f5",
                      "error": "#ba1a1a",
                      "tertiary": "#5a5f63",
                      "on-primary-fixed-variant": "#2e4a5b",
                      "inverse-on-surface": "#f1f0f2",
                      "background": "#faf9fa",
                      "primary-fixed": "#c9e6fc",
                      "surface-container-high": "#e9e8e9",
                      "on-primary-fixed": "#001e2d",
                      "on-error-container": "#93000a",
                      "on-primary": "#ffffff",
                      "on-secondary-container": "#36627f",
                      "secondary-fixed-dim": "#a0cced",
                      "on-tertiary": "#ffffff",
                      "inverse-primary": "#adcadf",
                      "surface-container-highest": "#e3e2e3",
                      "secondary-container": "#b1ddff",
                      "tertiary-container": "#bdc2c7",
                      "on-error": "#ffffff",
                      "primary-fixed-dim": "#adcadf",
                      "surface-variant": "#e3e2e3",
                      "surface-container-lowest": "#ffffff",
                      "outline-variant": "#c2c7cc",
                      "primary-container": "#a8c5da",
                      "surface-container": "#eeedef",
                      "primary": "#466274",
                      "tertiary-fixed-dim": "#c3c7cc",
                      "on-secondary-fixed": "#001e2f",
                      "surface-bright": "#faf9fa",
                      "on-tertiary-container": "#4b5054",
                      "surface": "#faf9fa",
                      "on-secondary": "#ffffff",
                      "surface-dim": "#dadadb",
                      "secondary-fixed": "#c9e6ff",
                      "on-tertiary-fixed-variant": "#42474b",
                      "on-background": "#1a1c1d",
                      "on-secondary-fixed-variant": "#1b4b67"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "lg": "32px",
                      "xs": "4px",
                      "sm": "8px",
                      "xl": "64px",
                      "unit": "8px",
                      "gutter": "24px",
                      "md": "16px"
              },
              "fontFamily": {
                      "h1": ["Times New Roman", "serif"],
                      "label-sm": ["Inter", "sans-serif"],
                      "h2": ["Times New Roman", "serif"],
                      "h3": ["Times New Roman", "serif"],
                      "body-md": ["Inter", "sans-serif"],
                      "body-lg": ["Inter", "sans-serif"]
              },
              "fontSize": {
                      "h1": ["48px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "400"}],
                      "label-sm": ["12px", {"lineHeight": "1", "fontWeight": "600"}],
                      "h2": ["32px", {"lineHeight": "1.3", "fontWeight": "400"}],
                      "h3": ["24px", {"lineHeight": "1.4", "fontWeight": "400"}],
                      "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                      "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}]
              }
          },
          },
        }
      </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-[#EEF2F7]">
<div class="flex min-h-screen items-center justify-center p-md">
<!-- Phone Frame centered in single column -->
<div class="phone-frame bg-primary-container flex flex-col items-center justify-between py-16 px-8 relative">
<!-- Top Notch/Status Bar Placeholder -->
<div class="absolute top-0 left-0 w-full h-10 flex justify-between px-10 items-end">
<span class="text-[14px] font-bold text-on-primary-container">9:41</span>
<div class="flex gap-2">
<span class="material-symbols-outlined text-[18px] text-on-primary-container">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-[18px] text-on-primary-container">wifi</span>
<span class="material-symbols-outlined text-[18px] text-on-primary-container">battery_full</span>
</div>
</div>
<!-- Top Area: Concentric Rings -->
<div class="flex-1 flex items-center justify-center w-full">
<div class="concentric-rings relative">
<div class="ring-1 flex items-center justify-center">
<div class="ring-2 flex items-center justify-center">
<div class="ring-3 flex items-center justify-center">
<div class="dot-inner"></div>
</div>
</div>
</div>
</div>
</div>
<!-- Middle Content -->
<div class="text-center mb-16">
<h1 class="serif-text text-[36px] text-[#2A3A4A] leading-tight">MindEase</h1>
<p class="font-body-md text-[13px] italic text-on-surface-variant/70 mt-2">Quiet your mind, find your center.</p>
</div>
<!-- Bottom Content -->
<div class="w-full flex flex-col items-center gap-6">
<button class="w-full py-5 bg-[#5E89A8] text-white rounded-full font-label-sm text-[16px] tracking-wide active:scale-[0.98] transition-transform">
                        Get started
                    </button>
<p class="font-body-md text-[13px] text-on-surface-variant">
                        I already have an account · <span class="font-bold cursor-pointer text-[#2A3A4A]">Sign in</span>
</p>
</div>
<!-- Home Indicator -->
<div class="absolute bottom-2 w-32 h-1.5 bg-[#2A3A4A]/20 rounded-full left-1/2 -translate-x-1/2"></div>
</div>
</div>
</body></html>
