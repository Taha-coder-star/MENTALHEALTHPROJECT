<body class="font-body-md text-on-background antialiased">
<!-- TopAppBar from JSON -->
<header class="flex items-center justify-between px-4 w-full h-16 border-b border-slate-100 bg-white sticky top-0 z-50">
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-sky-700 active:opacity-70 transition-opacity p-2 hover:bg-slate-50 transition-colors rounded-full" data-icon="arrow_back">arrow_back</button>
<span class="font-serif text-lg tracking-tight text-slate-900 font-semibold">MindEase</span>
</div>
<div class="flex items-center">
<!-- Right side actions if needed -->
</div>
</header>
<main class="min-h-[calc(100vh-64px)] flex flex-col md:flex-row">
<!-- Left Presentation Column (45%) -->
<section class="hidden md:flex md:w-[45%] bg-surface-container-low flex-col justify-center px-xl border-r border-outline-variant/10">
<div class="max-w-md">
<h1 class="font-h1 text-h1 text-on-secondary-fixed-variant mb-md">Welcome in.</h1>
<p class="font-body-lg text-body-lg text-secondary mb-lg">Experience mental clarity through disciplined minimalism and professional guidance.</p>
<div class="relative w-full aspect-square bg-surface-container rounded-xl overflow-hidden">
<img alt="Serene landscape" class="w-full h-full object-cover opacity-80" data-alt="A serene and minimalist landscape photo featuring a single green plant in a white porcelain vase against a soft, mist-colored wall. The lighting is diffused and natural, coming from a large window off-screen, creating gentle shadows. The overall aesthetic is calm and professional, utilizing a palette of soft blues, whites, and muted greens to reflect a sense of mental clarity and peace." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDyn4MTvEfvBg40ZD6lkRze5GpFTgIhLsS6ppwVXsq18GwDhX0vfKUK-HMTIBRBStj3mSQBjkRB_B2u4FQ9arBRlmcKSwT2xOxEbFDbFSUfd68BTKhiF8QIpwp8mPcr7n6mFY4zDcJyLhPz_r7XsqRJkfjYav8U7LNc_xhU_AhDpL4W3p6z_2IbIb5r8KglwBo3YAc6geXTy6jZ5swyMVWs8Ud4zfTHeA9JkUmv9KfOJqupR13zN0EoYu5uTOTn1PJysPRhA6HZNIE"/>
</div>
</div>
</section>
<!-- Right Interaction Column (55%) -->
<section class="w-full md:w-[55%] flex flex-col justify-center px-gutter py-xl bg-white">
<div class="max-w-md mx-auto w-full">
<!-- Mobile Only Header -->
<h1 class="md:hidden font-h1 text-h1 text-on-secondary-fixed-variant mb-lg">Welcome in.</h1>
<!-- Anonymous Sign In Card -->
<button class="w-full flex items-center justify-between p-md mb-lg bg-surface-container-low hover:bg-surface-container transition-colors rounded-xl group border border-transparent active:border-outline-variant/20">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-secondary text-[24px]" data-icon="shield">shield</span>
<span class="font-body-md text-on-surface font-semibold">Sign in anonymously</span>
</div>
<span class="material-symbols-outlined text-outline group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Form Section -->
<div class="space-y-md">
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-outline px-xs" for="email">Email address</label>
<input class="w-full h-12 px-md font-body-md bg-white border border-outline-variant/30 rounded-lg focus:border-primary focus:ring-0 transition-all outline-none" id="email" placeholder="name@example.com" type="email"/>
</div>
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-outline px-xs" for="password">Password</label>
<input class="w-full h-12 px-md font-body-md bg-white border border-outline-variant/30 rounded-lg focus:border-primary focus:ring-0 transition-all outline-none" id="password" placeholder="••••••••" type="password"/>
</div>
<!-- Sign In Button -->
<button class="w-full h-12 bg-secondary text-white font-body-md font-semibold rounded-full mt-lg hover:bg-on-secondary-container active:scale-[0.98] transition-all">
                        Sign in
                    </button>
<!-- Footer Links -->
<div class="text-center mt-md">
<a class="font-body-md text-primary hover:text-on-secondary-container transition-colors" href="#">Forgot password?</a>
</div>
</div>
<!-- Footer Annotation -->
<div class="mt-xl pt-lg border-t border-surface-container flex flex-col items-center gap-sm">
<p class="font-label-sm text-outline text-center">New to MindEase? <a class="text-primary font-bold" href="#">Create an account</a></p>
<div class="flex gap-md mt-sm">
<span class="px-sm py-xs bg-surface-container rounded font-label-sm text-outline">SECURE</span>
<span class="px-sm py-xs bg-surface-container rounded font-label-sm text-outline">PRIVATE</span>
</div>
</div>
</div>
</section>
